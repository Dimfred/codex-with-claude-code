# Available models: gpt-5.5, gpt-5.4, gpt-5.4-mini, gpt-5.3-codex, gpt-5.3-codex-spark (Pro only)
# gpt-5.5 may still be rolling out - use gpt-5.4 as fallback
codex_model: &codex_model chatgpt/gpt-5.5

litellm_settings:
  callbacks:
    - callbacks.strip_system_messages

model_list:
  # Route all Claude Opus models to ChatGPT Codex
  - model_name: claude-opus-4-5
    model_info:
      mode: responses
    litellm_params:
      model: *codex_model
  - model_name: claude-opus-4-6
    model_info:
      mode: responses
    litellm_params:
      model: *codex_model
  - model_name: claude-opus-4-7
    model_info:
      mode: responses
    litellm_params:
      model: *codex_model
